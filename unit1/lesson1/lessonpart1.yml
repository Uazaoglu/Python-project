title: Page 1
content: >
  ## Introduction to While Loops


  In this lesson, you will learn how to use while loops in Python to execute a
  block of code repeatedly as long as a specified condition is true. While loops
  are useful for tasks that require repeated execution until a certain condition
  is met.


  ### Syntax of a While Loop


  ```python

  while condition:
      # code block to be executed
  ```


  * **condition**: A boolean expression that is evaluated before each iteration.
  If it evaluates to `True`, the loop continues; if `False`, the loop stops.


  * **code block**: The set of statements that will be executed as long as the
  condition is true.


  ### Example


  Let's look at a simple example of a while loop that prints numbers from 1 to
  5:


  ```python

  count = 1

  while count <= 5:
      print(count)
      count += 1
  ```


  In this example:


  * The loop starts with `count` set to 1.


  * The condition `count <= 5` is checked before each iteration.


  * The loop prints the current value of `count` and then increments it by 1.


  * The loop stops when `count` becomes 6, as the condition `count <= 5` is no
  longer true.


  ### Task


  Write a Python program using a while loop that asks the user to input numbers.
  The program should continue to ask for numbers until the user enters a
  negative number. Once a negative number is entered, the program should print
  the sum of all entered numbers (excluding the negative number).


  ### Tips


  * Use a variable to keep track of the sum of the numbers.


  * Use the `input()` function to get user input and `int()` to convert it to an
  integer.


  * Remember to update the sum inside the loop.


  ### Challenge


  Modify your program to also count how many numbers were entered before the
  negative number and print this count along with the sum.


  ```

